<!-- require APlayer -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.css">
<script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js" defer></script>
<!-- require MetingJS -->
<script src="https://cdn.jsdelivr.net/npm/meting@2/dist/Meting.min.js" defer></script>

<!-- 自定义样式：将播放器移动到右下角 -->
<style>
.aplayer.aplayer-fixed {
    left: auto !important;
    right: 0 !important;
    bottom: 0 !important;
}
</style>

<meting-js
    server="netease"
    type="playlist"
    id="17704549797"
    fixed="true"
    listFolded="true"
    volume="0.5"
    preload="auto"
>
</meting-js>

<script>
// 修复点1：给CDN加defer，确保脚本加载完再执行JS；移除autoplay，避免浏览器直接拦截
function initAutoPlay() {
    const observer = new MutationObserver(function(mutations, obs) {
        const aplayerElement = document.querySelector('.aplayer');
        // 修复点2：增加aplayer实例的双重校验，确保就绪
        if (aplayerElement && window.APlayer && aplayerElement.aplayer) {
            obs.disconnect();
            const ap = aplayerElement.aplayer;
            console.log('检测到 APlayer 已初始化');

            // 核心播放方法，抽离出来方便复用
            const playMusic = () => {
                const playPromise = ap.play();
                if (playPromise) {
                    playPromise.then(() => {
                        console.log('音乐自动播放成功');
                    }).catch(error => {
                        console.log('浏览器阻止了自动播放，等待用户交互');
                        // 修复点3：移除capture: true，用冒泡阶段，避免事件被拦截
                        const playOnInteraction = function() {
                            ap.play().then(() => {
                                console.log('用户交互后开始播放');
                            }).catch(e => {
                                console.log('播放失败:', e);
                            });
                            // 移除所有绑定的事件，避免重复执行
                            document.removeEventListener('click', playOnInteraction);
                            document.removeEventListener('touchstart', playOnInteraction);
                            document.removeEventListener('keydown', playOnInteraction);
                        };
                        document.addEventListener('click', playOnInteraction);
                        document.addEventListener('touchstart', playOnInteraction);
                        document.addEventListener('keydown', playOnInteraction);
                    });
                }
            };

            // 修复点4：用播放器的ready事件替代固定延时，确保资源完全就绪
            ap.on('ready', playMusic);
            // 兜底延时，防止ready事件未触发
            setTimeout(playMusic, 1000);
        }
    });

    observer.observe(document.body, {
        childList: true,
        subtree: true
    });
}

// 页面加载完成后再初始化，适配Hugo模板渲染时序
document.addEventListener('DOMContentLoaded', initAutoPlay);

// 兼容 Swup 页面切换
if (typeof swup !== 'undefined') {
    swup.hooks.on('page:view', initAutoPlay);
}
</script>
