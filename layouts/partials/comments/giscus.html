{{/* DNS 预连接优化 */}}
<link rel="preconnect" href="https://giscus.app" crossorigin>
<link rel="dns-prefetch" href="https://giscus.app">

{{/* giscus 容器 */}}
<div id="giscus-container" class="giscus-placeholder">
    <div class="giscus-loading">
        <div class="loading-spinner"></div>
        <p class="loading-text">评论区加载中...</p>
    </div>
</div>

{{/* 优化样式 */}}
<style>
    .giscus-placeholder {
        min-height: 200px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .giscus-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        padding: 2rem 1rem;
        color: var(--text-secondary, #666);
        transition: opacity 0.3s ease;
    }

    .loading-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--border-color, #e0e0e0);
        border-top-color: var(--accent-color, #3b82f6);
        border-radius: 50%;
        animation: giscus-spin 0.8s linear infinite;
    }

    @keyframes giscus-spin {
        to { transform: rotate(360deg); }
    }

    .loading-text {
        font-size: 0.875rem;
        opacity: 0.7;
    }

    .giscus-frame {
        min-height: 200px;
        width: 100%;
    }

    #giscus-container:not(.giscus-placeholder) {
        min-height: 400px;
    }

    /* 确保 giscus iframe 可见 */
    #giscus-container iframe {
        width: 100% !important;
        min-height: 200px !important;
        border: none !important;
    }
</style>
